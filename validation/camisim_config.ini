# CAMISIM config template — adapt paths to your CAMISIM install + version.
# Install: git clone https://github.com/CAMI-challenge/CAMISIM  (conda env from
# its requirements), or use the Docker image. Then:
#   python metagenomesimulation.py validation/camisim_config.ini
#
# This uses our KNOWN per-sample abundances (distributions/*.tsv from
# build_community.py) so the ground truth is exactly what we designed.
# Set `number_of_samples` and the per-sample distribution paths to match
# camisim_in/samples.txt. Run once per sequencing depth by changing `size`.

[Main]
seed=42
phase=0
max_processors=24
dataset_id=kariocas_mock
output_directory=camisim_out
temp_directory=/tmp
gsa=False
pooled_gsa=False
anonymous=False
compress=1

[ReadSimulator]
# Illumina paired-end via ART. profile: hi150 (HiSeq 150bp) or mbarc.
readsim=/path/to/CAMISIM/tools/art_illumina/art_illumina
error_profiles=/path/to/CAMISIM/tools/art_illumina/profiles
samtools=samtools
profile=hi150
# Gbp per sample — make 2-3 copies of this config with different sizes for the
# low/med/high depth arms, e.g. 0.5, 2.0, 8.0
size=2.0
type=art
fragments_size_mean=270
fragment_size_standard_deviation=27

[CommunityDesign]
ncbi_taxdump=/path/to/CAMISIM/tools/ncbi-taxonomy_20...tar.gz
strain_simulation_template=/path/to/CAMISIM/scripts/StrainSimulationWrapper/sgEvolver/simulation_dir
# comma-separated, one per sample, in the SAME order as samples.txt
distribution_file_paths=camisim_in/distributions/MOCKeven01.tsv,camisim_in/distributions/MOCKeven02.tsv
number_of_samples=2

[community0]
metadata=camisim_in/metadata.tsv
id_to_genome_file=camisim_in/genome_to_id.tsv
id_to_gff_file=
genomes_total=46
num_real_genomes=46
max_strains_per_otu=1
ratio=1
# use our supplied abundances rather than re-drawing them
mode=known_distribution
log_mu=1
log_sigma=2
gauss_mu=1
gauss_sigma=1
view=False
